# EXAMPLE ONLY — do not commit a real auto-import-secret to git.
#
# RHACM needs a kubeconfig (or token+server) for the spoke cluster to auto-import it.
# Generate this secret out-of-band (e.g. `oc create secret generic ... --dry-run=client
# -o yaml` piped to `oc apply`, or a secrets manager/External Secrets Operator) and
# apply it directly to the CLUSTER_NAME namespace on the hub — never check the real
# kubeconfig/token into this repo.
#
# Shape of the secret RHACM expects:
apiVersion: v1
kind: Secret
metadata:
  name: auto-import-secret
  namespace: CLUSTER_NAME
type: Opaque
stringData:
  autoImportRetry: "5"
  # Either provide a kubeconfig:
  kubeconfig: |
    # <spoke cluster kubeconfig contents>
  # ...or a token + server pair instead of kubeconfig:
  # token: <spoke cluster bearer token>
  # server: https://api.<spoke-cluster-domain>:6443

# EXAMPLE ONLY — do not commit a real auto-import-secret to git.
#
# Recommended approach: a scoped ServiceAccount + short-lived token, generated on the
# SPOKE cluster, built into this secret directly via `oc create secret --from-literal`
# on the HUB (never written to a file). See spoke-clusters/README.md step 3 for the
# full procedure and why cluster-admin is genuinely required for the one-time import
# handshake (RBAC escalation rules, not carelessness).
#
# Shape of the secret RHACM expects (token + server — the validated approach):
#   oc create secret generic auto-import-secret \
#     -n CLUSTER_NAME \
#     --from-literal=token="<token from `oc create token rhacm-import ...`>" \
#     --from-literal=server="https://api.<spoke-cluster-domain>:6443" \
#     --from-literal=autoImportRetry="5"
#
# Equivalent YAML form, shown here only to document the shape:
apiVersion: v1
kind: Secret
metadata:
  name: auto-import-secret
  namespace: CLUSTER_NAME
type: Opaque
stringData:
  autoImportRetry: "5"
  token: <spoke cluster bearer token, from the scoped ServiceAccount>
  server: https://api.<spoke-cluster-domain>:6443
  # A full kubeconfig also works instead of token+server, but isn't the recommended
  # path here since it's harder to scope to a single short-lived credential:
  # kubeconfig: |
  #   # <spoke cluster kubeconfig contents>
